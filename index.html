<!DOCTYPE html>

<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{background:#04000e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;font-family:'Heebo',Arial,sans-serif;user-select:none;-webkit-user-select:none;overscroll-behavior:none;}
#wrap{position:relative;width:min(800px,100dvw);flex-shrink:0}
canvas{display:block;width:100%;aspect-ratio:800/450;border-radius:10px;box-shadow:0 0 80px rgba(180,60,255,0.4),0 0 25px rgba(255,100,0,0.15);touch-action:none;filter:contrast(1.09) saturate(1.28) brightness(1.02) hue-rotate(-6deg);}
#hint{color:#6644aa;font-size:10px;text-align:center;margin-top:4px;padding:0 6px 2px;line-height:1.5;direction:rtl;}
#btnFs{position:absolute;top:8px;right:8px;width:32px;height:32px;border:none;border-radius:7px;background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.75);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);transition:background .12s,color .12s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
#btnFs:hover,#btnFs:active{background:rgba(255,255,255,0.2);color:#fff;}
#btnQuit{position:absolute;top:8px;left:8px;height:30px;padding:0 10px;border:none;border-radius:7px;background:rgba(0,0,0,0.42);border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.7);font-size:12px;font-family:'Heebo',Arial,sans-serif;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:20;white-space:nowrap;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);transition:background .12s,color .12s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
#btnQuit:hover,#btnQuit:active{background:rgba(255,60,60,0.32);color:#fff;border-color:rgba(255,100,100,0.4);}
#ctrl{position:absolute;inset:0;pointer-events:none;display:none}
@media(hover:none),(pointer:coarse){#ctrl{display:block}}
#pend{position:absolute;bottom:5%;left:3%;display:flex;align-items:center;gap:3%;pointer-events:auto;opacity:0;transform:scale(0.7);transition:opacity .2s,transform .2s;}
#ctrl.swinging #pend{opacity:1;transform:scale(1);}
#apad{position:absolute;bottom:3%;left:0;right:0;display:flex;flex-direction:row;align-items:flex-end;justify-content:space-between;padding:0 4%;pointer-events:none;}
.cb{border:none;outline:none;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none;font-family:'Heebo',Arial,sans-serif;transition:background .07s,transform .07s,box-shadow .08s;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);width:clamp(72px,19vw,86px);height:clamp(72px,19vw,86px);font-size:clamp(28px,7.8vw,36px);background:rgba(10,2,40,0.72);border:2px solid rgba(255,255,255,0.28);color:rgba(255,255,255,0.95);box-shadow:0 3px 18px rgba(0,0,0,0.65),inset 0 1px 0 rgba(255,255,255,0.12);}
.cb:active,.cb.on{transform:scale(0.88);background:rgba(255,255,255,0.25)}
#bL,#bR{width:clamp(56px,14vw,68px);height:clamp(56px,14vw,68px);font-size:clamp(22px,6vw,28px);background:rgba(25,8,55,0.62);border-color:rgba(160,110,255,0.45);color:rgba(220,200,255,0.95);}
#bL:active,#bL.on,#bR:active,#bR.on{background:rgba(150,90,255,0.35)}
#bUp{background:rgba(110,15,200,0.55);border-color:rgba(200,100,255,0.75);color:#e8b4ff;box-shadow:0 0 18px rgba(180,60,255,0.4),0 3px 14px rgba(0,0,0,0.6);}
#bUp:active,#bUp.on{background:rgba(180,70,255,0.75);box-shadow:0 0 30px rgba(200,80,255,0.7);}
#bDown{background:rgba(10,120,50,0.28);border-color:rgba(60,220,110,0.45);color:rgba(120,255,160,0.9);}
#bDown:active,#bDown.on{background:rgba(40,200,80,0.45);}
#bJ{background:radial-gradient(circle at 38% 32%,rgba(255,235,80,0.65),rgba(255,120,0,0.45));border-color:rgba(255,210,0,0.9);color:#FFD700;box-shadow:0 0 32px rgba(255,200,0,0.65),0 4px 18px rgba(0,0,0,0.65),inset 0 1px 0 rgba(255,255,200,0.25);width:clamp(76px,20vw,90px);height:clamp(76px,20vw,90px);font-size:clamp(30px,8vw,38px);}
#bJ:active,#bJ.on{transform:scale(0.88);box-shadow:0 0 42px rgba(255,220,0,0.8);}
.bjl{font-size:clamp(6px,1.6vw,8px);color:rgba(255,215,0,0.7);line-height:1;margin-top:1px;white-space:nowrap;letter-spacing:.3px}
.legready #bJ{animation:gpulse .45s ease-in-out infinite alternate;box-shadow:0 0 42px rgba(255,220,0,0.95),0 0 80px rgba(255,180,0,0.55);}
@keyframes gpulse{from{transform:scale(1)}to{transform:scale(1.12)}}

<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <button id="btnFs" title="Plein écran / מסך מלא" aria-label="Plein écran">⛶</button>
  <button id="btnQuit" aria-label="Menu / Skip">← Menu</button>
  <div id="ctrl">
    <div id="pend">

      </div>

    </div>

</div>
<script>
/* ══════════════════════════════════════════════════
   TRAPEZE STARS v2 — כוכבי הטרפז
   Single-file HTML5 Canvas 2D game — zero dependencies
   ══════════════════════════════════════════════════ */
const CV=document.getElementById('c'),CX=CV.getContext('2d');
CV.width=800;CV.height=450;
const W=800,H=450;

function _resetShadow(ctx){ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;ctx.globalAlpha=1;}
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){r=Math.min(r,w/2,h/2);this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arc(x+w-r,y+r,r,-Math.PI/2,0);this.lineTo(x+w,y+h-r);this.arc(x+w-r,y+h-r,r,0,Math.PI/2);this.lineTo(x+r,y+h);this.arc(x+r,y+h-r,r,Math.PI/2,Math.PI);this.lineTo(x,y+r);this.arc(x+r,y+r,r,Math.PI,3*Math.PI/2);this.closePath();};}

/* ─── FULLSCREEN ─── */
const btnFs=document.getElementById('btnFs');
const wrapEl=document.getElementById('wrap');
const hintEl=document.getElementById('hint');
const gameCanvas=document.getElementById('c');
const _isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
const _isPWA=window.navigator.standalone===true||window.matchMedia('(display-mode: standalone)').matches;
let _iosFull=false;
function applyIosFullStyle(){
  wrapEl.style.cssText=['position:fixed','inset:0','width:100%','height:100%','max-width:none','background:#000','display:flex','align-items:center','justify-content:center','z-index:9999','border-radius:0'].join(';');
  gameCanvas.style.cssText=['border-radius:0','width:auto','height:auto','max-width:100%','max-height:100%','aspect-ratio:800/450','touch-action:none'].join(';');
  if(hintEl)hintEl.style.display='none';
  document.body.style.overflow='hidden';document.documentElement.style.overflow='hidden';
  document.documentElement.style.height='100%';document.body.style.height='100%';
  window.scrollTo(0,1);setTimeout(()=>window.scrollTo(0,1),100);
  btnFs.textContent='✕';btnFs.title='Quitter';
  try{if(screen.orientation&&screen.orientation.lock)screen.orientation.lock('landscape').catch(()=>{});}catch(e){}
}
function removeIosFullStyle(){
  wrapEl.style.cssText='';gameCanvas.style.cssText='touch-action:none;';
  if(hintEl)hintEl.style.display='';
  document.body.style.overflow='';document.documentElement.style.overflow='';
  document.documentElement.style.height='';document.body.style.height='';
  btnFs.textContent='⛶';btnFs.title='Plein écran';_iosFull=false;
  try{if(screen.orientation&&screen.orientation.unlock)screen.orientation.unlock();}catch(e){}
}
function enterFull(){
  if(_isIOS&&!_isPWA){_iosFull=true;applyIosFullStyle();return;}
  const el=document.documentElement;
  const fn=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen;
  if(fn){fn.call(el,{navigationUI:'hide'}).then(()=>{_iosFull=false;}).catch(()=>{_iosFull=true;applyIosFullStyle();});}
  else{_iosFull=true;applyIosFullStyle();}
}
function exitFull(){
  const fn=document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen||document.msExitFullscreen;
  if(fn&&(document.fullscreenElement||document.webkitFullscreenElement))fn.call(document).catch(()=>{});
  if(_iosFull)removeIosFullStyle();
}
function toggleFS(){
  const isNativeFull=document.fullscreenElement||document.webkitFullscreenElement;
  if(!isNativeFull&&!_iosFull)enterFull();else exitFull();
}
btnFs.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();toggleFS();});
function onFsChange(){const isFs=document.fullscreenElement||document.webkitFullscreenElement;if(isFs){btnFs.textContent='✕';}else if(!_iosFull){btnFs.textContent='⛶';}}
document.addEventListener('fullscreenchange',onFsChange);document.addEventListener('webkitfullscreenchange',onFsChange);
function onResize(){if(_iosFull)applyIosFullStyle();}
window.addEventListener('resize',onResize);window.addEventListener('orientationchange',()=>setTimeout(onResize,150));
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&_iosFull)removeIosFullStyle();});

/* ─── POST-FX: GRAIN + VIGNETTE + BLOOM + LETTERBOX ─── */
const GS=128;let gC=null,gX=null,gPat=null;
function initGrain(){gC=document.createElement('canvas');gC.width=GS;gC.height=GS;gX=gC.getContext('2d');updateGrain();}
function updateGrain(){const id=gX.createImageData(GS,GS),d=id.data;for(let i=0;i<d.length;i+=4){const n=(Math.random()*28)|0;d[i]=d[i+1]=d[i+2]=n;d[i+3]=22;}gX.putImageData(id,0,0);gPat=CX.createPattern(gC,'repeat');}
const bmCV=document.createElement('canvas');bmCV.width=Math.round(W/3);bmCV.height=Math.round(H/3);const bmCX=bmCV.getContext('2d');
function drawBloom(){bmCX.clearRect(0,0,bmCV.width,bmCV.height);bmCX.drawImage(CV,0,0,bmCV.width,bmCV.height);CX.save();CX.globalCompositeOperation='lighter';CX.globalAlpha=0.13;CX.filter='blur(5px)';CX.drawImage(bmCV,0,0,W,H);CX.filter='blur(10px)';CX.globalAlpha=0.06;CX.drawImage(bmCV,0,0,W,H);CX.filter='none';CX.restore();}
function drawPostFX(){
  if(frameN%3===0)updateGrain();
  if(gPat){CX.save();CX.globalCompositeOperation='soft-light';CX.globalAlpha=0.55;CX.fillStyle=gPat;CX.fillRect(0,0,W,H);CX.restore();}
  const vig=CX.createRadialGradient(W/2,H*0.48,H*0.14,W/2,H*0.48,H*0.88);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(0.68,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.82)');
  CX.fillStyle=vig;CX.fillRect(0,0,W,H);
  if(gs==='playing'||gs==='levelcomplete'){
    const bar=H*0.075;CX.fillStyle='rgba(0,0,0,0.9)';CX.fillRect(0,0,W,bar);CX.fillRect(0,H-bar,W,bar);
    CX.fillStyle='rgba(255,255,255,0.03)';CX.fillRect(0,0,W,bar);CX.fillRect(0,H-bar,W,bar);
  }
}

/* ─── AUDIO ─── */
let aud=null;
function initAud(){try{aud=new(window.AudioContext||window.webkitAudioContext)();if(aud.state==='suspended')aud.resume();}catch(e){}}
function unlockAudio(){if(!aud)initAud();else if(aud.state==='suspended')aud.resume().catch(()=>{});}
document.addEventListener('touchstart',unlockAudio,{passive:true,once:true});
document.addEventListener('pointerdown',unlockAudio,{passive:true,once:true});
function tone(f,d,tp,v,sl){if(!aud)return;try{const o=aud.createOscillator(),g=aud.createGain();o.connect(g);g.connect(aud.destination);o.type=tp||'sine';o.frequency.setValueAtTime(f,aud.currentTime);if(sl)o.frequency.linearRampToValueAtTime(sl,aud.currentTime+d);g.gain.setValueAtTime(v||0.22,aud.currentTime);g.gain.exponentialRampToValueAtTime(0.001,aud.currentTime+d);o.start();o.stop(aud.currentTime+d+0.01);}catch(e){}}
function sfxJump(){tone(520,0.1,'sine',0.18,750);setTimeout(()=>tone(780,0.05,'sine',0.1),80);}
function sfxDj(){tone(600,0.08,'sine',0.2,1100);setTimeout(()=>tone(1100,0.12,'sine',0.12),90);}
function sfxGrab(){tone(180,0.06,'sawtooth',0.22);setTimeout(()=>tone(340,0.1,'sawtooth',0.15),50);}
function sfxRel(){tone(320,0.14,'sine',0.14,140);}
function sfxHoop(){tone(880,0.06,'sine',0.3);setTimeout(()=>tone(1100,0.08,'sine',0.22),45);setTimeout(()=>tone(1500,0.2,'sine',0.18),100);}
function sfxBounce(){tone(100,0.04,'sine',0.4);setTimeout(()=>tone(560,0.3,'sine',0.2,180),32);}
function sfxHit(){tone(140,0.4,'sawtooth',0.28,70);}
function sfxStar(){tone(1300,0.09,'sine',0.15,2200);}
function sfxMedal(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'sine',0.25),i*105));}
function sfxLegsault(){tone(80,0.15,'sine',0.45);setTimeout(()=>tone(400,0.5,'sine',0.18,80),50);setTimeout(()=>{tone(300,0.12,'sine',0.22);tone(450,0.12,'sine',0.18);},500);setTimeout(()=>tone(200,0.4,'sawtooth',0.2),800);}
function sfxCeremony(){[400,500,600,800,1000].forEach((f,i)=>setTimeout(()=>tone(f,0.3,'sine',0.3),i*120));}
function sfxSpin(){sfxDj();}
function sfxScore(){sfxHoop();}
function sfxLand(){sfxBounce();}
function sfxSpinDestroy(){tone(200,0.05,'sawtooth',0.4);setTimeout(()=>tone(600,0.2,'square',0.3,100),40);setTimeout(()=>tone(1200,0.25,'sine',0.2),150);}

/* ─── CONSTANTS ─── */
const GY=400,GRV=0.36,JP=-16.0,DJP=-14.0,JP_TR=-22,MXF=14,ROPE=112,CROPE=32;

/* ─── WORLD THEMES ─── */
const THEMES={
  cirque:{name:'Cirque',he:'קרקס',em:'🎪',hoops:['#e74c3c','#3498db','#f39c12','#9b59b6','#27ae60','#e91e63'],platTop:'#c8952a',platFill:'#6a1a42',barColor:'#c89228',barReady:'#FFD700'},
  jungle:{name:'Jungle',he:'ג׳ונגל',em:'🌿',hoops:['#44cc22','#88dd00','#ffbb00','#ff8800','#22aa88','#aaff44'],platTop:'#5d8a00',platFill:'#2d5500',barColor:'#6B4226',barReady:'#88cc44'},
  plage:{name:'Plage',he:'חוף',em:'🏖️',hoops:['#00bbff','#ff6699','#ffcc00','#00ddaa','#ff8833','#aa44ff'],platTop:'#d4a96a',platFill:'#c88a44',barColor:'#a0a0a0',barReady:'#FFD700'},
  futur:{name:'Futur',he:'עתיד',em:'🤖',hoops:['#00ffff','#8800ff','#ff00aa','#00ff88','#ffaa00','#ff4400'],platTop:'#00ffcc',platFill:'#0a1a2a',barColor:'#0088ff',barReady:'#00ffff'}
};
let TH='cirque';
function TC(){return THEMES[TH];}

/* ─── GAME STATE ─── */
let gs='menu',score=0,lives=3,mult=1,multTimer=0,scrollX=0,scrollSpd=1.8,frameN=0;
let highScore=+(localStorage.getItem('tse5_hs')||0),lastHoop=0,hoopStreak=0;
let medalShow='',medalTimer=0,menuAnim=0,charChoice='marc',menuChar='marc',menuWorld='cirque';
let flashTimer=0,shakeX=0,shakeY=0,shakeDur=0;
let olaActive=false,olaFrame=0,clapActive=false,clapTimer=0,ovationActive=false,ovationTimer=0;
let legsaultFlight=0;
let jBuf=0,grabBuf=0,mLeft=false,mRight=false;
const JBUF=6;
let dangerFlash=0;
let cerFlash=0;
let cheatTaps=0,cheatLastTap=0,cheatFlash=0;
const CHEAT_TAPS=5,CHEAT_WINDOW=3000;

/* ─── LEVEL SYSTEM ─── */
let currentWorld=0,currentLevel=1;
let levelDistTarget=0,levelCatchCount=0;
let consecutiveDeaths=0,ddaEasing=0;
let lc={frame:0,stars:0,done:false};
let fin={active:false,frame:0,fireworks:[],chars:[],rings:[]};
let cer={active:false,frame:0,j1x:-90,j2x:W+90,j3x:-130,trophyRaised:false,olaOK:false,done:false};

function getLevelParams(world,level){
  const dda=1-ddaEasing*0.2;
  return{
    speed:[1.8,2.3,2.8][level-1]*(1+world*0.06)*dda,
    gapMin:[80,110,140][level-1],gapMax:[120,160,200][level-1],
    spikeChance:[0.3,0.5,0.68][level-1]*dda,
    clownInterval:[320,250,185][level-1],
    distTarget:[2200,2600,3100][level-1],
    bgTint:[[0,0,0,0],
      world===0?[80,0,0,0.06]:world===1?[0,40,0,0.06]:world===2?[0,20,60,0.07]:[20,0,60,0.06],
      world===0?[120,0,0,0.12]:world===1?[0,60,0,0.1]:world===2?[0,30,80,0.12]:[30,0,100,0.12]][level-1]
  };
}

/* ─── MUSIC ─── */
let musicOsc=[],musicPlaying=false;
function stopMusic(){musicOsc.forEach(o=>{try{o.stop();}catch(e){}});musicOsc=[];musicPlaying=false;}
function playMusic(world,level){if(!aud)return;stopMusic();const t=aud.currentTime+0.08;const master=aud.createGain();master.gain.value=0.16;master.connect(aud.destination);[playCircus,playJungle,playBeach,playFutur][world](t,master,level);musicPlaying=true;}
function note(freq,type,start,dur,vol,master,det=0){
  const o=aud.createOscillator(),g=aud.createGain();
  o.type=type;o.frequency.value=freq;if(det)o.detune.value=det;
  g.gain.setValueAtTime(0,start);g.gain.linearRampToValueAtTime(vol,start+0.02);
  g.gain.setValueAtTime(vol,start+dur-0.04);g.gain.linearRampToValueAtTime(0,start+dur);
  o.connect(g);g.connect(master);o.start(start);o.stop(start+dur+0.01);musicOsc.push(o);
}
function playCircus(t,m,lv){
  const bpm=125+lv*8,b=60/bpm;
  const mel=[523,659,784,659,523,659,784,1047,784,659,523,659,523,392,523,523];
  for(let loop=0;loop<12;loop++){mel.forEach((f,i)=>{const nt=t+loop*mel.length*b+i*b;note(f,'square',nt,b*0.75,0.08,m);note(f*2,'sine',nt,b*0.3,0.025,m);note(i%2===0?131:196,'triangle',nt,b*0.55,0.12,m);if(i%4===0)note(880,'square',nt,0.04,0.05,m);});}
}
function playJungle(t,m,lv){
  const bpm=100+lv*6,b=60/bpm;
  for(let i=0;i<36;i++){
    const bt=t+i*b;
    if(i%4===0||i%4===2){const o=aud.createOscillator(),g=aud.createGain();o.type='sine';o.frequency.setValueAtTime(160,bt);o.frequency.exponentialRampToValueAtTime(40,bt+0.14);g.gain.setValueAtTime(0.45,bt);g.gain.exponentialRampToValueAtTime(0.001,bt+0.28);o.connect(g);g.connect(m);o.start(bt);o.stop(bt+0.3);musicOsc.push(o);}
    note(55+(i%8)*8,'triangle',bt,b*0.9,0.1,m);
    if(i%2===1)note(220,'sine',bt,b*0.2,0.06,m,700);
  }
}
function playBeach(t,m,lv){
  const bpm=112+lv*5,b=60/bpm;
  const mel=[523,659,784,880,784,659,523,659,523,392,440,523,659,784,880,784];
  for(let loop=0;loop<10;loop++){mel.forEach((f,i)=>{const nt=t+loop*mel.length*b+i*b;note(f,'sine',nt,b*0.45,0.12,m);note(f*2,'sine',nt,b*0.2,0.035,m);if(i%2===1)note(164,'triangle',nt,b*0.4,0.09,m);if(i%4===0)note(82,'sine',nt,b*0.8,0.14,m);});}
}
function playFutur(t,m,lv){
  const bpm=128+lv*6,b=60/bpm*0.5;

/* ─── DRAW CHAR (v2: direction flip + _resetShadow) ─── */
function drawChar(x,y,state,af,rot,charOverride){
  _resetShadow(CX);CX.filter='none';
  CX.save();CX.translate(x,y);
  // Direction flip based on player velocity (gameplay only)
  let facing=1;
  if(gs==='playing'&&state!=='swing'&&state!=='hang'){
    if(P.vx<-0.5){facing=-1;P.lastFacing=-1;}
    else if(P.vx>0.5){P.lastFacing=1;}
    facing=P.lastFacing||1;
  }
  CX.scale(1.3*facing,1.3);
  const ch=charOverride||P.char;
  if(ch==='marc')drawMarc(0,0,state,af,rot);else drawClaire(0,0,state,af,rot);
  CX.restore();
  _resetShadow(CX);CX.filter='none';CX.globalCompositeOperation='source-over';
}

/* ─── AUDIENCE ─── */
function drawAudience(){
  const rows=[{baseY:412,sc:1.0,cols:22},{baseY:397,sc:0.82,cols:20},{baseY:384,sc:0.66,cols:18}];
  rows.forEach(({baseY,sc,cols},row)=>{
    const colW=W/cols;
    for(let col=0;col<cols;col++){
      const bx=col*colW+colW/2;
      const peakT=col*(22/cols)*4;const delta=olaFrame-peakT;
      const olaRise=(olaActive&&delta>=0&&delta<22)?Math.sin(delta/22*Math.PI)*16:0;
      const ovRise=ovationActive?10+Math.sin(frameN*0.2+col*0.3)*3:0;
      const clapArm=clapActive?Math.abs(Math.sin(frameN*0.35+col*0.2))*10:0;
      const pY=baseY-(olaRise+ovRise)*sc;const ph=24*sc,pw=16*sc;
      let seatDark=TH==='jungle'?'#1e3500':TH==='plage'?'#004055':TH==='futur'?'#000d2e':'#6a0000';
      CX.fillStyle=seatDark;CX.beginPath();CX.roundRect(bx-pw/2-1,pY+2,pw+2,9*sc,2);CX.fill();
      let seatTop=TH==='jungle'?'#3d7000':TH==='plage'?'#007fa0':TH==='futur'?'#002688':'#bb0e0e';
      CX.fillStyle=seatTop;CX.beginPath();CX.roundRect(bx-pw/2,pY,pw,7*sc,2);CX.fill();
      let bodyCol=TH==='jungle'?`hsl(${90+col*2},30%,${18+row*3}%)`:TH==='plage'?`hsl(${200+col*2},28%,${20+row*3}%)`:TH==='futur'?`hsl(${230+col*3},35%,${18+row*3}%)`:`hsl(${220+col*3+row*10},28%,${22+row*3}%)`;
      CX.fillStyle=bodyCol;CX.beginPath();CX.roundRect(bx-pw/2+1,pY-ph+5,pw-2,ph,3);CX.fill();
      let headCol=TH==='plage'?`hsl(${25+col*3},50%,${50+row*4}%)`:`hsl(${25+col*3},42%,${44+row*4}%)`;
      CX.fillStyle=headCol;CX.beginPath();CX.arc(bx,pY-ph,pw*0.52,0,Math.PI*2);CX.fill();
      const armH=(clapArm+olaRise*0.55+ovRise*0.45)*sc;
      if(armH>1.5){CX.strokeStyle=bodyCol;CX.lineWidth=Math.max(1.5,3.5*sc);CX.lineCap='round';CX.beginPath();CX.moveTo(bx-pw/2,pY-ph*0.38);CX.lineTo(bx-pw/2-5*sc,pY-ph*0.38-armH);CX.stroke();CX.beginPath();CX.moveTo(bx+pw/2,pY-ph*0.38);CX.lineTo(bx+pw/2+5*sc,pY-ph*0.38-armH);CX.stroke();}
    }
  });
}

/* ─── DRAW WORLD ─── */
function drawWorld(){
  drawBG();
  for(const g of gapZones)drawGap(g);
  for(const pl of plats){const sx=pl.x-scrollX;if(sx>W+10||sx+pl.w<-10)continue;const ppx=P.x-scrollX;const onAbove=ppx>sx-20&&ppx<sx+pl.w+20&&P.y<pl.y&&P.y>pl.y-120;if(onAbove&&pl.type==='gnd'){const dist=Math.max(0,(pl.y-P.y)/120);CX.fillStyle='rgba(255,215,0,'+(1-dist)*0.25+')';CX.fillRect(sx,pl.y-2,pl.w,4);}pl.type==='gnd'?drawPlatform(sx,pl):drawElevPlatform(sx,pl);}
  for(const t of tramps){const sx=t.x-scrollX;if(sx>W+80||sx+t.w<-80)continue;drawTrampoline(sx,t.y,t.w,t.sp);}
  for(const sb of spikes){if(sb.dead)continue;const sx=sb.x-scrollX;if(sx>W+60||sx<-60)continue;sb.rot+=0.045;if(frameN%3===0)spawnFire(sx,sb.y+sb.r,1,8);drawSpike(sx,sb.y,sb.r,sb.rot);if(sx>W*0.55&&sx<W*0.92){const wa=0.55+0.45*Math.sin(frameN*0.35);CX.globalAlpha=wa;CX.fillStyle='#FF2200';CX.font='bold 18px Arial';CX.textAlign='center';CX.fillText('⚠',sx,sb.y-sb.r-14);CX.globalAlpha=1;}}
  for(const cl of clowns){if(cl.dead)continue;const sx=cl.x-scrollX;if(sx>W+60||sx<-70)continue;drawNPC(sx,cl.y,cl.af);const distToPlayer=sx-(P.x-scrollX);if(distToPlayer>0&&distToPlayer<W*0.5){const urgency=1-distToPlayer/(W*0.5);const wp=0.6+0.4*Math.sin(frameN*(0.2+urgency*0.3));CX.globalAlpha=wp;CX.fillStyle=urgency>0.6?'#FF0000':'#FF4400';CX.font=`bold ${Math.round(14+urgency*8)}px Arial`;CX.textAlign='center';CX.fillText('⚠',sx,cl.y-92);CX.globalAlpha=1;}}
  for(const b of bars){const sx=b.x-scrollX;if(sx>W+65||sx+b.w<-65)continue;const near=isNear(b);drawBar(sx,b,near,P.bar===b);}
  for(const cat of catchers){const b=cat.bar;const bsx=b.x-scrollX+b.w/2;if(bsx>W+100||bsx<-100)continue;drawCatcher(bsx,b.y,cat);}
  // Gap danger warning
  for(const g of gapZones){const sx=g.x-scrollX,ex=g.x2-scrollX;if(ex<W*0.4||sx>W*0.95)continue;const gapCenter=(sx+ex)/2;const ahead=gapCenter-(P.x-scrollX);if(ahead>0&&ahead<W*0.55){const urgency=Math.max(0,1-ahead/(W*0.55));const wa=urgency*(0.6+0.4*Math.sin(frameN*0.3));CX.globalAlpha=wa*0.55;CX.fillStyle='rgba(255,30,0,0.7)';CX.fillRect(Math.max(sx,0),GY-8,Math.min(ex,W)-Math.max(sx,0),10);if(urgency>0.3){CX.globalAlpha=wa*0.9;CX.fillStyle='#FF3300';CX.font='bold 18px Arial';CX.textAlign='center';CX.fillText('↓',gapCenter,GY-15);}CX.globalAlpha=1;}}
  // Hoops
  for(const h of hoops){if(h.passed)continue;const sx=h.x-scrollX;if(sx>W+75||sx<-75)continue;h.rot+=0.026;if(h.fire&&frameN%2===0){for(let fi=0;fi<8;fi++){const fa=(fi/8)*Math.PI*2;spawnFire(sx+Math.cos(fa)*h.r,h.y+Math.sin(fa)*h.r,1,7);}}CX.strokeStyle=h.color+'33';CX.lineWidth=14;CX.beginPath();CX.arc(sx,h.y,h.r+7,0,Math.PI*2);CX.stroke();CX.strokeStyle=h.color+'88';CX.lineWidth=7;CX.beginPath();CX.arc(sx,h.y,h.r+2,0,Math.PI*2);CX.stroke();CX.strokeStyle=h.color;CX.lineWidth=5.5;CX.beginPath();CX.arc(sx,h.y,h.r,0,Math.PI*2);CX.stroke();CX.strokeStyle='rgba(255,255,255,0.5)';CX.lineWidth=2.5;CX.beginPath();CX.arc(sx,h.y,h.r-4,h.rot,h.rot+Math.PI*0.75);CX.stroke();for(let si=0;si<4;si++){const sa=h.rot*2.5+(si/4)*Math.PI*2;CX.globalAlpha=0.4+0.6*Math.abs(Math.sin(frameN*0.1+si*1.5));star5(sx+Math.cos(sa)*(h.r+10),h.y+Math.sin(sa)*(h.r+10),4.5,1.8,h.color);}CX.globalAlpha=1;}
  for(const s of stItems){if(s.done)continue;const sx=s.x-scrollX;if(sx>W+15||sx<-15)continue;s.t+=0.06;CX.globalAlpha=0.7+0.3*Math.sin(s.t);CX.fillStyle='rgba(255,215,0,0.18)';CX.beginPath();CX.arc(sx,s.y+Math.sin(s.t)*4,15,0,Math.PI*2);CX.fill();star5(sx,s.y+Math.sin(s.t)*4,12,5,'#FFD700');CX.globalAlpha=1;}
}

/* ─── DRAW PLAYER (v2: swing preview arc + landing zone indicator) ─── */
function drawPlayer(){
  if(P.inv>0&&Math.floor(P.inv/5)%2===1)return;
  const px=P.x-scrollX,py=P.y;
  // Halo during tricks
  if(['pirouette','salto','djump'].includes(P.state)||legsaultFlight>0){
    const glowCol=P.char==='marc'?'30,110,232':'232,56,122';const intensity=legsaultFlight>0?0.32:0.22;
    const glowR=CX.createRadialGradient(px,py-18,0,px,py-18,65);glowR.addColorStop(0,`rgba(${glowCol},${intensity})`);glowR.addColorStop(0.45,`rgba(${glowCol},${intensity*0.4})`);glowR.addColorStop(1,'transparent');CX.fillStyle=glowR;CX.fillRect(px-70,py-85,140,130);
  }
  // Contact shadow
  if(P.onGnd||P.state==='land'){const sg=CX.createRadialGradient(px,py+2,0,px,py+2,22);sg.addColorStop(0,'rgba(0,0,0,0.45)');sg.addColorStop(1,'rgba(0,0,0,0)');CX.fillStyle=sg;CX.beginPath();CX.ellipse(px,py+2,22,6,0,0,Math.PI*2);CX.fill();}
  else if(py<GY+65){const dist=Math.max(0,(GY-py)/65);const sg2=CX.createRadialGradient(px,GY+1,0,px,GY+1,18+5*dist);sg2.addColorStop(0,`rgba(0,0,0,${0.25*dist})`);sg2.addColorStop(1,'rgba(0,0,0,0)');CX.fillStyle=sg2;CX.beginPath();CX.ellipse(px,GY+1,18+5*dist,4,0,0,Math.PI*2);CX.fill();}
  // Landing zone indicator (pulsing circle on nearest platform below)
  if(!P.onGnd&&P.state!=='swing'&&P.state!=='hang'&&P.vy>0){
    let nearestY=GY,nearestX=px;
    for(const pl of plats){const sx2=pl.x-scrollX;if(px+16>sx2&&px-16<sx2+pl.w&&pl.y>P.y){if(pl.y<nearestY){nearestY=pl.y;nearestX=Math.max(sx2+12,Math.min(sx2+pl.w-12,px));}}}
    const lzp=0.5+0.5*Math.sin(frameN*0.25);const lzr=14+lzp*5;CX.globalAlpha=(0.3+0.3*lzp)*Math.min(1,(P.vy/MXF));CX.strokeStyle=P.char==='marc'?'#7ecbff':'#ff88bb';CX.lineWidth=2;CX.beginPath();CX.arc(nearestX,nearestY-2,lzr,0,Math.PI*2);CX.stroke();CX.globalAlpha=1;
  }
  _resetShadow(CX);
  // Trail
  for(let i=0;i<P.trail.length;i++){const t2=P.trail[i];const alpha=(i/P.trail.length)*0.48;const size=8*(i/P.trail.length)+1;CX.globalAlpha=alpha;CX.fillStyle=legsaultFlight>0?`hsl(${(frameN*12+i*18)%360},100%,60%)`:P.state==='djump'?'#7ecbff':P.state==='pirouette'?`hsl(${(frameN*8+i*24)%360},100%,65%)`:'#FFD700';CX.beginPath();CX.arc(t2.x,t2.y,size,0,Math.PI*2);CX.fill();}
  CX.globalAlpha=1;
  // Spin orbit
  if(P.state==='pirouette'){const spinColor=P.char==='marc'?['#4499ff','#88ccff','#2266dd']:['#ff66aa','#ffaacc','#dd2288'];for(let i=0;i<6;i++){const angle=(i/6)*Math.PI*2+frameN*0.24;const orR=38+Math.sin(frameN*0.12+i)*7;const ox2=px+Math.cos(angle)*orR*1.35;const oy2=py-20+Math.sin(angle)*orR*0.5;CX.globalAlpha=0.55+0.45*Math.sin(frameN*0.18+i*1.1);CX.fillStyle=spinColor[i%3];CX.beginPath();CX.arc(ox2,oy2,3.5+Math.sin(frameN*0.14+i)*1.5,0,Math.PI*2);CX.fill();}CX.globalAlpha=1;}
  // Swing trajectory preview (dotted arc)
  if(P.state==='swing'&&P.bar){const b2=P.bar;const bcx=b2.x-scrollX+b2.w/2;let simA=P.bAngle,simV=P.bAngV;CX.save();CX.setLineDash([3,5]);CX.strokeStyle='rgba(255,215,0,0.35)';CX.lineWidth=1.8;CX.beginPath();let first=true;for(let f=0;f<20;f++){const acc=-(0.3/ROPE)*Math.sin(simA);simV+=acc;simV*=0.999;simA+=simV;const px2=bcx+Math.sin(simA)*ROPE;const py2=b2.y+Math.cos(simA)*ROPE;if(first){CX.moveTo(px2,py2);first=false;}else CX.lineTo(px2,py2);}CX.stroke();CX.setLineDash([]);CX.restore();}
  const rot=['pirouette','salto','djump'].includes(P.state)?P.rot:0;
  // Draw with squash/stretch
  CX.save();CX.translate(px,py);CX.scale(P.sqX,P.sqY);drawChar(0,0,P.state,P.af,rot);CX.restore();
  _resetShadow(CX);
}

/* ─── DRAW PARTICLES ─── */
function drawParts(){
  for(const p of parts){
    CX.globalAlpha=Math.max(0,p.life*0.93);
    if(p.type==='fire'){CX.fillStyle=p.life>0.6?'#FFE855':p.life>0.3?'#FF8800':'#FF2200';CX.beginPath();CX.arc(p.x,p.y,Math.max(0.3,p.r*p.life*1.3),0,Math.PI*2);CX.fill();}
    else if(p.type==='star'){star5(p.x,p.y,p.r*1.9,p.r*0.7,p.col);}
    else if(p.type==='rect'){CX.save();CX.translate(p.x,p.y);CX.rotate(p.rotA||0);CX.fillStyle=p.col;CX.fillRect(-(p.w||p.r*2)/2,-p.r/2,p.w||p.r*2,p.r);CX.restore();}
    else{CX.fillStyle=p.col;CX.beginPath();CX.arc(p.x,p.y,Math.max(0.3,p.r*p.life),0,Math.PI*2);CX.fill();}
  }
  CX.globalAlpha=1;

  for(const t of ftexts){CX.globalAlpha=t.life*t.life;CX.fillStyle=t.col;CX.font=`bold ${t.sz}px Heebo,Arial`;CX.fillText(t.text,t.x,t.y);}

function updateLevelComplete(){
  updateParts();
  if(lcTimer>0){lcTimer--;return;}

}

/* ─── PHYSICS HELPERS ─── */
function isNear(b,d){const d2=d||72;return Math.hypot(P.x+P.w/2-(b.x+b.w/2),P.y+P.h/2-b.y)<d2;}
function findNear(arr,x,y,d){let best=null,bd=d*d;for(const o of arr){const dx=o.x-x,dy=o.y-y;const dd=dx*dx+dy*dy;if(dd<bd){bd=dd;best=o;}}return best;}
function catHandPos(c){return{x:c.x+c.w/2,y:c.y+c.h*0.28};}
function findNearCatcher(){
  for(const c of catchers){
    const hp=catHandPos(c);
    if(Math.abs(hp.x-(P.x+P.w/2))<72&&Math.abs(hp.y-(P.y+P.h/2))<72)return c;
  }return null;
}

/* ─── INPUT: JUMP / GRAB ─── */
function handleSpace(){
  if(gs!=='playing')return;
  jBuf=true;jBufTimer=6;
}
function doLegsault(){
  P.state='pirouette';P.rot=0;P.vy=-15;P.vx*=1.1;
  legsaultFlight=45;sfxSpin();
  sqImpulse(1.15,0.88);
  spawnStarPts(P.x+P.w/2,P.y+P.h/2,6,'#FFD700');
}
function grabBar(b){
  P.state='swing';P.bar=b;
  P.bAngle=Math.atan2(P.x+P.w/2-(b.x+b.w/2),-(P.y+P.h/2-b.y));
  P.bAngV=P.vx*0.028+P.vy*0.005;
  P.vx=0;P.vy=0;P.onGnd=false;P.coyote=0;
  sfxGrab();sqImpulse(0.85,1.18);
}
function releaseBar(){
  if(!P.bar)return;
  const b=P.bar;const bcx=b.x+b.w/2;
  P.vx=P.bAngV*ROPE*Math.cos(P.bAngle)+Math.sin(P.bAngle)*2;
  P.vy=-Math.abs(P.bAngV)*ROPE*0.55;
  P.x=bcx+Math.sin(P.bAngle)*ROPE-P.w/2;
  P.y=b.y+Math.cos(P.bAngle)*ROPE-P.h;
  P.bar=null;P.state='jump';
  sfxJump();sqImpulse(1.2,0.82);
}

/* ─── PHYSICS UPDATE ─── */
function updatePendulum(){
  if(P.state!=='swing'||!P.bar)return;
  const acc=-(GRV/ROPE)*Math.sin(P.bAngle);
  P.bAngV+=acc;P.bAngV*=0.9985;
  P.bAngle+=P.bAngV;
  const bcx=P.bar.x+P.bar.w/2;
  P.x=bcx+Math.sin(P.bAngle)*ROPE-P.w/2;
  P.y=P.bar.y+Math.cos(P.bAngle)*ROPE-P.h;
}
function doLand(py){
  P.y=py-P.h;P.vy=0;P.onGnd=true;P.coyote=10;
  if(P.state!=='run'&&P.state!=='idle'){sfxLand();sqImpulse(1.3,0.72);}
  P.state=P.vx!==0?'run':'idle';
  legsaultFlight=0;
}
function loseLife(){
  if(P.inv>0)return;
  mLeft=false;mRight=false;
  lives--;P.inv=90;P.vy=-10;P.vx=0;P.state='jump';
  doFlash(12,'#FF0000');doShake(10);sfxHit();
  if(lives<=0){gs='gameover';}
}
function passHoop(h){
  if(h.passed)return;
  h.passed=true;combo++;const pts=combo>=5?300:combo>=3?200:100;
  addScore(pts,h.x-scrollX,h.y);
  spawnStarPts(h.x,h.y,'#FFD700');
  sfxScore();
  if(combo>=5)ftext(h.x+h.w/2-scrollX,h.y-20,'COMBO!','#FF8800',26);
}

/* ─── PARTICLES UPDATE ─── */
function updateParts(){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx;p.y+=p.vy;
    if(p.grav!==undefined)p.vy+=p.grav;else p.vy+=0.06;
    p.vx*=0.97;p.life-=p.decay||0.022;
    if(p.rotA!==undefined)p.rotA+=p.rotV||0.05;
    if(p.life<=0)parts.splice(i,1);
  }
  for(let i=ftexts.length-1;i>=0;i--){
    const t=ftexts[i];t.y-=1.2;t.life-=0.022;
    if(t.life<=0)ftexts.splice(i,1);
  }
}


/* ─── MAIN UPDATE ─── */
function update(){
  if(gs==='playing'){
    sqUpdate();
    // Horizontal movement: keyboard + mobile buttons
    if(P.state!=='swing'&&P.state!=='caught'){
      const goR=K['ArrowRight']||K['KeyD']||mRight;
      const goL=K['ArrowLeft']||K['KeyA']||mLeft;
      const spd=(getLevelParams(currentWorld,currentLevel)||{speed:3}).speed;
      if(goR){P.vx=Math.min(P.vx+1.2,spd+4);P.lastFacing=1;}
      else if(goL){P.vx=Math.max(P.vx-1.2,-(spd+4));P.lastFacing=-1;}
    }
    // Input buffer countdown
    if(jBufTimer>0)jBufTimer--;else jBuf=false;
    if(grabBufTimer>0)grabBufTimer--;else grabBuf=false;

    // Animation frame + double-jump reset on land
    P.af++;
    if(P.onGnd)P.djump=true;

    // Coyote time
    if(P.onGnd)P.coyote=10;else if(P.coyote>0)P.coyote--;

    // Trail
    P.trail.push({x:P.x+P.w/2,y:P.y+P.h/2});
    if(P.trail.length>18)P.trail.shift();

    // Invincibility
    if(P.inv>0)P.inv--;

    // Legsault flight
    if(legsaultFlight>0)legsaultFlight--;

    /* --- SWING STATE --- */
    if(P.state==='swing'){
      updatePendulum();
      // Release: jump buffered or space pressed during swing
      if(jBuf){jBuf=false;jBufTimer=0;releaseBar();}
      // grabBuf during swing releases and performs legsault
      if(grabBuf){grabBuf=0;grabBufTimer=0;releaseBar();doLegsault();}
    } else {
      /* --- AIRBORNE / RUN / IDLE --- */
      if(P.state!=='caught'){
        // Gravity
        P.vy+=GRV;
        if(P.vy>MXF)P.vy=MXF;
        P.x+=P.vx;P.y+=P.vy;
        // Friction
        if(P.onGnd){P.vx*=0.78;}else{P.vx*=0.992;}

        // Horizontal clamp at scroll edge
        if(P.x<scrollX-P.w)P.x=scrollX-P.w;

        // Pirouette / salto spin
        if(P.state==='pirouette'||P.state==='salto'){
          P.rot+=0.28;
          if(P.rot>Math.PI*2){P.rot-=Math.PI*2;}
        }

        P.onGnd=false;
        // Platform collisions
        for(const pl of plats){
          if(P.x+P.w>pl.x&&P.x<pl.x+pl.w&&P.y+P.h>pl.y&&P.y+P.h<pl.y+38&&P.vy>=0){
            doLand(pl.y);break;
          }
        }
        for(const pl of elevPlats){
          const ty=pl.y-Math.abs(Math.sin(pl.phase))*pl.range;
          if(P.x+P.w>pl.x&&P.x<pl.x+pl.w&&P.y+P.h>ty&&P.y+P.h<ty+38&&P.vy>=0){
            doLand(ty);break;
          }
        }

        // Spike / gap death
        for(const sp of spikes){
          if(Math.hypot(P.x+P.w/2-sp.x,P.y+P.h/2-sp.y)<(sp.r||18)+8){loseLife();break;}
        }
        if(P.y>H+60)loseLife();
        // Clown collision
        for(const cl of clowns){
          if(!cl.dead&&Math.hypot(P.x+P.w/2-cl.x,P.y+P.h/2-cl.y)<38)loseLife();
        }

        // Hoop pass
        for(const h of hoops){
          if(!h.passed&&Math.hypot(P.x+P.w/2-h.x,P.y+P.h/2-h.y)<(h.r||38)){
            passHoop(h);
          }
        }

        // Star items
        for(const s of stItems){
          if(!s.done&&Math.hypot(P.x+P.w/2-s.x,P.y+P.h/2-s.y)<22){
            s.done=true;addScore(50,s.x-scrollX,s.y);sfxStar();spawnStarPts(s.x,s.y,'#FFD700');
          }
        }

        // Bar grab — magnetic snap 45px
        if(P.state!=='swing'&&P.state!=='pirouette'){
          for(const b of bars){
            const bx=b.x+b.w/2,by=b.y;
            const px3=P.x+P.w/2,py3=P.y+P.h/2;
            const dist=Math.hypot(px3-bx,py3-by);
            if(dist<45&&P.vy<0){
              // Magnetic snap
              grabBar(b);break;
            }
            // Manual grab buffer
            if(grabBuf&&dist<72){
              grabBuf=false;grabBufTimer=0;
              grabBar(b);break;
            }
          }
        }

        // Jump with coyote time + input buffer
        if(jBuf&&(P.onGnd||P.coyote>0)){
          jBuf=false;jBufTimer=0;P.coyote=0;
          P.vy=JP;P.onGnd=false;P.state='jump';
          sfxJump();sqImpulse(0.82,1.22);
          // Double jump
        } else if(jBuf&&!P.onGnd&&P.djump){
          jBuf=false;jBufTimer=0;P.djump=false;
          P.vy=JP*0.88;P.state='djump';
          sfxSpin();sqImpulse(0.88,1.18);
          spawnStarPts(P.x+P.w/2,P.y+P.h,'#7ecbff',5);
        }

        // Legsault: press grab in air
        if(grabBuf&&!P.onGnd&&legsaultFlight<=0&&P.state!=='swing'){
          // check no nearby bar
          let nearBar=false;
          for(const b of bars){if(Math.hypot(P.x+P.w/2-(b.x+b.w/2),P.y+P.h/2-b.y)<72){nearBar=true;break;}}
          if(!nearBar){grabBuf=false;grabBufTimer=0;doLegsault();}
        }
      }

      // Caught state — immediate release
      if(P.state==='caught'){P.state='jump';P.vy=JP*0.9;P.catcher=null;}
    }

    /* --- CAMERA --- */
    const targetX=P.x-W*0.33;
    scrollX+=(targetX-scrollX)*0.09;
    if(scrollX<0)scrollX=0;

    /* --- ELEVATING PLATFORMS --- */
    for(const pl of elevPlats){pl.phase+=0.035;}

    /* --- CATCHERS --- */
    for(const c of catchers){
      c.angle+=c.angV;
      if(Math.abs(c.angle)>0.9)c.angV*=-1;
      c.af=(c.af||0)+1;
    }

    /* --- OLA / OVATION timers --- */
    if(olaActive){olaFrame++;if(olaFrame>120)olaActive=false;}
    if(clapActive){clapTimer--;if(clapTimer<=0)clapActive=false;}
    if(ovationActive){ovationTimer--;if(ovationTimer<=0)ovationActive=false;}

    /* --- CLOWNS update (move + animate) --- */
    clownTimer--;
    if(clownTimer<=0){
      clownTimer=getLevelParams(currentWorld,currentLevel).clownInterval;
      clowns.push({x:scrollX+W+80,y:GY,vx:-(1.4+Math.random()),af:0,dead:false});
    }
    for(const cl of clowns){cl.x+=cl.vx;cl.af++;if(cl.x<scrollX-120)cl.dead=true;}
    for(let i=clowns.length-1;i>=0;i--){if(clowns[i].dead)clowns.splice(i,1);}

    /* --- SPIKES bounce --- */
    for(const sp of spikes){sp.y+=sp.vy*sp.dir;if(sp.y<sp.minY||sp.y>sp.maxY)sp.dir*=-1;}

    /* --- WORLD GEN on advance --- */
    while(scrollX+W*1.8>genX)genChunk();

    /* --- DANGER WARNING --- */
    let nearSpike=false;
    for(const sp of spikes){if(sp.x-P.x<200&&sp.x>P.x)nearSpike=true;}
    if(nearSpike)dangerFlash=Math.max(dangerFlash,40);

    /* --- LEVEL COMPLETE trigger --- */
    if(P.x>goalX&&!levelDone){
      levelDone=true;
      lcStars=lives>=3?3:lives>=2?2:1;
      lcJudgeScores=[((7+Math.random()*3).toFixed(1)),(((7+Math.random()*3)).toFixed(1)),(((7+Math.random()*3)).toFixed(1))];
      gs='levelcomplete';startLevelComplete();
    }

  } else if(gs==='levelcomplete'){
    updateLevelComplete();
  } else if(gs==='ceremony'){
    updateCeremony();
  } else if(gs==='finale'){
    updateFinale();
  }
}

  // Title
  const shake2=flashN>0?Math.random()*4-2:0;
  CX.fillStyle='#FF2222';CX.font='bold 46px Heebo,Arial';CX.textAlign='center';
  CX.shadowColor='#FF0000';CX.shadowBlur=30;
  CX.fillText('GAME OVER',W/2+shake2,H/2-60);CX.shadowBlur=0;
  // Score
  CX.fillStyle='#FFFFFF';CX.font='bold 22px Heebo,Arial';
  CX.fillText('Score: '+score,W/2,H/2);
  if(score>=highScore&&score>0){CX.fillStyle='#FFD700';CX.font='bold 16px Heebo,Arial';CX.fillText('🏆 Nouveau record !',W/2,H/2+30);}
  // Restart
  const rp=0.6+0.4*Math.sin(frameN*0.1);
  CX.globalAlpha=rp;CX.fillStyle='#AADDFF';CX.font='18px Heebo,Arial';
  CX.fillText('Appuyez pour recommencer',W/2,H/2+75);
  CX.globalAlpha=1;
  CX.restore();
}

/* ─── MAIN LOOP ─── */
function loop(){
  CX.clearRect(0,0,W,H);
  frameN++;
  // Flash overlay
  if(flashTimer>0){flashTimer--;CX.fillStyle='rgba(255,255,255,'+(flashTimer/18)+')';CX.fillRect(0,0,W,H);}
  // Shake
  if(shakeDur>0){CX.save();CX.translate(shakeX*(shakeDur/10),shakeY*(shakeDur/10));shakeDur--;}
  // Draw state
  if(gs==='menu'){
    drawMenu();
  } else if(gs==='playing'){
    update();drawWorld();drawParts();drawPlayer();drawHUD();
  } else if(gs==='levelcomplete'){
    update();drawWorld();drawParts();drawPlayer();drawLevelComplete();
  } else if(gs==='ceremony'){
    update();drawCeremony();
  } else if(gs==='finale'){
    update();drawFinale();
  } else if(gs==='gameover'){
    drawGameOver();drawParts();
    if(jBuf||grabBuf||tapN>0){tapN=0;jBuf=0;grabBuf=0;gs='menu';score=0;lives=3;level=0;initMenu();}
  }
  if(shakeDur>=0&&shakeX)CX.restore();
  drawBloom();drawPostFX();
  requestAnimationFrame(loop);
}

/* ─── START GAME ─── */
function startGame(){
  unlockAudio();
  lives=3;score=0;level=0;combo=0;levelDone=false;
  currentWorld=0;currentLevel=1;TH='cirque';
  gs='playing';
  initWorld();
  stopMusic();
  playMusic(0,1);
}

/* ─── KEYBOARD INPUT ─── */
document.addEventListener('keydown',e=>{
  if(e.repeat)return;
  if(gs==='menu'){
    if(e.key==='ArrowLeft'||e.key==='a')menuSel=0;
    if(e.key==='ArrowRight'||e.key==='d')menuSel=1;
    if(e.key===' '||e.key==='Enter'){P.char=menuSel===0?'marc':'claire';startGame();}
    return;
  }
  if(e.key===' '||e.key==='ArrowUp'||e.key==='w'){handleSpace();}
  if(e.key==='ArrowRight'||e.key==='d'){P.vx+=3.5;}
  if(e.key==='ArrowLeft'||e.key==='a'){P.vx-=3.5;}
  if(e.key==='f'||e.key==='z'||e.key==='Shift'){grabBuf=1;grabBufTimer=6;}
  if(e.key==='Escape'){gs='menu';stopMusic();initMenu();}
});
document.addEventListener('keyup',e=>{
  // nothing needed
});

/* ─── TOUCH / MOBILE INPUT ─── */
let touchStartX=0,touchStartY=0,touchStartT=0;

CV.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0];
  touchStartX=t.clientX;touchStartY=t.clientY;touchStartT=Date.now();
  tapN++;
  // Cheat: 5 taps top-left 55x55 within 3s
  checkCheat(t.clientX,t.clientY);
  if(gs==='menu'){
    // Tap right side = claire, left = marc
    const rx=t.clientX/CV.offsetWidth*W;
    if(rx>W/2)menuSel=1;else menuSel=0;
  } else if(gs==='playing'){
    handleSpace();
  }
},{passive:false});

CV.addEventListener('touchend',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  const dx=t.clientX-touchStartX;
  const dy=t.clientY-touchStartY;
  const dt=Date.now()-touchStartT;
  if(gs==='menu'){
    if(Math.abs(dx)>40){menuSel=dx>0?1:0;}
    else if(dt<400){P.char=menuSel===0?'marc':'claire';startGame();}
    return;
  }
  if(gs==='playing'){
    if(Math.abs(dx)>35&&dt<500){
      // Horizontal swipe
      P.vx=dx>0?6:-6;
    } else if(dy>40&&dt<400){
      // Swipe down: grab/legsault
      grabBuf=true;grabBufTimer=6;
    }
  }
},{passive:false});

/* ─── MOBILE BUTTONS ─── */
function mbtn(id,onDown,onUp){
  const el=document.getElementById(id);if(!el)return;
  el.addEventListener('touchstart',e=>{e.preventDefault();onDown();},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();if(onUp)onUp();},{passive:false});
  el.addEventListener('touchcancel',e=>{e.preventDefault();if(onUp)onUp();},{passive:false});
}
mbtn('bL',()=>{mLeft=true;},()=>{mLeft=false;});
mbtn('bR',()=>{mRight=true;},()=>{mRight=false;});
mbtn('bJ',()=>{
  if(gs==='playing'){handleSpace();}
  else if(gs==='menu'){P.char=menuSel===0?'marc':'claire';startGame();}
  else{jBuf=1;tapN++;}
});
mbtn('bDown',()=>{if(gs==='playing'){grabBuf=1;grabBufTimer=6;}});
mbtn('bUp',()=>{if(gs==='playing'){grabBuf=1;grabBufTimer=6;}});
const btnQuit=document.getElementById('btnQuit');
if(btnQuit)btnQuit.addEventListener('click',()=>{gs='menu';stopMusic();initMenu();});

/* ─── INIT & LAUNCH ─── */
const isMobile=/Android|iPhone|iPad|iPod|Touch/i.test(navigator.userAgent)||('ontouchstart' in window);
// highScore already initialised from localStorage above; sync alias
menuSel=0;gs='menu';frameN=0;
initGrain();
initMenu();
loop();

</script>
